server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with cache headers
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA under the base path — fallback to index.html
    location /lights-out/ {
        try_files $uri $uri/ /lights-out/index.html;
    }

    # Redirect from root
    location = / {
        return 301 /lights-out/;
    }
}
