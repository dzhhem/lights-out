name: Setup Node and Install Dependencies
description: Setup Node.js and run npm ci

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "20"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash
